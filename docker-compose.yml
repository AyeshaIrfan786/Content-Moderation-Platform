services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017/content-moderation
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      MODERATION_PROVIDER: ${MODERATION_PROVIDER:-grok}
      XAI_API_KEY: ${XAI_API_KEY:-}
      GROK_MODEL: ${GROK_MODEL:-grok-2-vision-1212}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - '5000:5000'

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '8080:80'

volumes:
  mongo_data:
